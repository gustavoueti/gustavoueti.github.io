    <script>
      // Restore route encoded by 404.html redirect workaround.
      ;(function () {
        var search = window.location.search
        if (search.indexOf('?p=') === 0 || search.indexOf('&p=') !== -1) {
          var params = new URLSearchParams(search)
          var path = params.get('p')
          var hash = params.get('h') || ''
          if (path) {
            window.history.replaceState(null, null, path + hash)
          }
        }
      })()
    </script>
