<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#160823"/>

  <!-- Ears -->
  <ellipse cx="9" cy="9" rx="4" ry="3.5" fill="#9a6c3e"/>
  <ellipse cx="23" cy="9" rx="4" ry="3.5" fill="#9a6c3e"/>

  <!-- Head block -->
  <rect x="6" y="10" width="20" height="14" rx="5" fill="#b8865a"/>
  <!-- Side cheeks -->
  <ellipse cx="6.5" cy="17" rx="3" ry="5.5" fill="#b8865a"/>
  <ellipse cx="25.5" cy="17" rx="3" ry="5.5" fill="#b8865a"/>

  <!-- Muzzle (wide, flat — traço da capivara) -->
  <rect x="8" y="19" width="16" height="8" rx="3.5" fill="#cfa06a"/>

  <!-- Eyes -->
  <circle cx="12" cy="15" r="2.5" fill="#1a0a2e"/>
  <circle cx="20" cy="15" r="2.5" fill="#1a0a2e"/>
  <!-- Eye shine -->
  <circle cx="13" cy="14" r="1" fill="white" opacity="0.85"/>
  <circle cx="21" cy="14" r="1" fill="white" opacity="0.85"/>

  <!-- Nostrils -->
  <ellipse cx="13" cy="23.5" rx="2" ry="1.4" fill="#7a4f28" opacity="0.7"/>
  <ellipse cx="19" cy="23.5" rx="2" ry="1.4" fill="#7a4f28" opacity="0.7"/>

  <!-- Cyan dot accent (consistent com o header) -->
  <circle cx="27" cy="5" r="2.5" fill="#67e8f9"/>

</svg>
